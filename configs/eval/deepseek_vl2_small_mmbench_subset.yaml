# Eval DeepSeek-VL2-Small (DeepSeek-MoE 16B/2.4B-active) on shijianS01/mmbench-subset.
model:
  name: deepseek-vl2-small
  config:
    model_path: deepseek-ai/deepseek-vl2-small
    # 16B total MoE bf16 ~31G，单卡 OOM；TP=2 跨两张 24G 卡。
    tensor_parallel: 2
    max_model_len: 4096
    gpu_memory_util: 0.9
    # config.json 里 architectures 是 null，必须显式覆盖告诉 vLLM
    hf_overrides:
      architectures: ["DeepseekVLV2ForCausalLM"]
    sampling:
      temperature: 0.0
      max_tokens: 128

benchmark:
  name: mmbench
  config:
    hf_path: shijianS01/mmbench-subset
    hf_name: default
    split: eval

extractor:
  sim_threshold: 0.5
  sentence_model: sentence-transformers/all-MiniLM-L6-v2

batch_size: 16
output_dir: outputs/deepseek_vl2_small_mmbench_subset
