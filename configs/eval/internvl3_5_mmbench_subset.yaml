# Eval InternVL3.5-8B on shijianS01/mmbench-subset (100 samples).
model:
  name: internvl3.5-8b
  config:
    model_path: OpenGVLab/InternVL3_5-8B
    tensor_parallel: 1
    max_model_len: 8192      # 24G 卡上 16384 KV cache 偏紧；mmbench 任务 prompt 短 8192 足够
    gpu_memory_util: 0.9
    # Cap visual tokens via dynamic patching (default 12 in HF processor).
    # Lower → fewer tokens, less KV pressure.
    max_dynamic_patch: 6
    sampling:
      temperature: 0.0
      max_tokens: 128

benchmark:
  name: mmbench
  config:
    hf_path: shijianS01/mmbench-subset
    hf_name: default
    split: eval

extractor:
  sim_threshold: 0.5
  sentence_model: sentence-transformers/all-MiniLM-L6-v2

batch_size: 16
output_dir: outputs/internvl3_5_mmbench_subset
