# Example: evaluate LLaVA-1.5-7B on MMBench dev (English).
model:
  name: llava-1.5-7b
  config:
    model_path: llava-hf/llava-1.5-7b-hf
    tensor_parallel: 1
    max_model_len: 4096
    gpu_memory_util: 0.9
    sampling:
      temperature: 0.0
      max_tokens: 128

benchmark:
  name: mmbench
  config:
    hf_path: lmms-lab/MMBench
    hf_name: en
    split: dev
    # limit: 100   # uncomment for smoke tests

extractor:
  sim_threshold: 0.5
  sentence_model: sentence-transformers/all-MiniLM-L6-v2

batch_size: 32
output_dir: outputs/llava15_mmbench_dev
