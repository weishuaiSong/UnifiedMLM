# Eval Phi-4 Multimodal 5.6B (Microsoft) on shijianS01/mmbench-subset.
model:
  name: phi-4-multimodal
  config:
    model_path: microsoft/Phi-4-multimodal-instruct
    tensor_parallel: 1
    max_model_len: 8192
    gpu_memory_util: 0.9
    sampling:
      temperature: 0.0
      max_tokens: 128

benchmark:
  name: mmbench
  config:
    hf_path: shijianS01/mmbench-subset
    hf_name: default
    split: eval

extractor:
  sim_threshold: 0.5
  sentence_model: sentence-transformers/all-MiniLM-L6-v2

# Phi-4-MM 在 vLLM 0.11.2 上 batch 不同分辨率的 image 时 image_attention_mask 形状不齐
# (shape (2,32,32) vs (3,32,32))，必须 batch_size=1 逐条跑。
batch_size: 1
output_dir: outputs/phi4_mm_mmbench_subset
