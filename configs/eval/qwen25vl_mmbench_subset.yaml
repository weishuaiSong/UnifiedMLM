# Eval Qwen2.5-VL-7B-Instruct on shijianS01/mmbench-subset (100 samples, eval split).
model:
  name: qwen2.5-vl-7b
  config:
    model_path: Qwen/Qwen2.5-VL-7B-Instruct
    tensor_parallel: 1
    max_model_len: 8192
    gpu_memory_util: 0.9
    # Cap visual tokens to keep batch_size=16 from OOMing on 40G cards.
    # 1003520 ≈ 1280×784 ≈ ~2.5k visual tokens per image. Raise if you have more VRAM.
    max_pixels: 1003520
    sampling:
      temperature: 0.0
      max_tokens: 128

benchmark:
  name: mmbench
  config:
    hf_path: shijianS01/mmbench-subset
    hf_name: default
    split: eval

extractor:
  sim_threshold: 0.5
  sentence_model: sentence-transformers/all-MiniLM-L6-v2

batch_size: 16
output_dir: outputs/qwen25vl_mmbench_subset
