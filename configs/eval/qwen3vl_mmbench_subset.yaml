# Eval Qwen3-VL-8B-Instruct on shijianS01/mmbench-subset (100 samples).
model:
  name: qwen3-vl-8b
  config:
    model_path: Qwen/Qwen3-VL-8B-Instruct
    tensor_parallel: 1
    max_model_len: 8192      # 24G 卡上 16384 KV cache 边界差 ~0.6G；mmbench 任务 prompt 短 8192 足够
    gpu_memory_util: 0.9
    # Cap visual tokens to keep batch_size=16 from OOMing on 40G cards.
    max_pixels: 1003520
    sampling:
      temperature: 0.0
      max_tokens: 128

benchmark:
  name: mmbench
  config:
    hf_path: shijianS01/mmbench-subset
    hf_name: default
    split: eval

extractor:
  sim_threshold: 0.5
  sentence_model: sentence-transformers/all-MiniLM-L6-v2

batch_size: 16
output_dir: outputs/qwen3vl_mmbench_subset
